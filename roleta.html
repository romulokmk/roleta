<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participante - Roleta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="coluna-roleta" style="width: 450px;">
        <h1 id="boasVindas">Participante</h1>
        
        <input type="text" id="campoLetra" placeholder="Digite sua sugestão..." style="width: 100%; padding: 10px; margin-bottom: 15px;">
        <button class="btn-girar" id="btnEnviar" onclick="enviarSugestao()" style="width: 100%; background-color: green;">Enviar</button>

        <div id="statusRodada" style="margin-top: 30px; color: gray;">Aguardando sorteio...</div>
        <div id="caixaResultado" style="margin-top: 20px; font-size: 22px; font-weight: bold;"></div>
    </div>

    <script>
    var usuarioLogado = sessionStorage.getItem("userLogin") || "Participante";
    document.getElementById("boasVindas").innerText = usuarioLogado;

    function enviarSugestao() {
        var campo = document.getElementById("campoLetra");
        var botao = document.getElementById("btnEnviar");
        var textoSugestao = campo.value.trim();

        if (textoSugestao == "") {
            alert("Erro: Digite uma sugestão válida antes de enviar!");
            return;
        }

        var ideiaBrain = localStorage.getItem("sugestoesBrainstorm");
        var listaIdeias = JSON.parse(ideiaBrain) || [];

        for (var i = 0; i < listaIdeias.length; i++) {
            if (listaIdeias[i].usuario == usuarioLogado) {
                alert("Erro: Você já inseriu uma sugestão nesta rodada!");
                return;
            }
        }

        listaIdeias.push({
            usuario: usuarioLogado,
            texto: textoSugestao
        });

        localStorage.setItem("sugestoesBrainstorm", JSON.stringify(listaIdeias));
        
        campo.disabled = true;
        botao.style.backgroundColor = "gray";
        botao.innerText = "Enviado";
    }

    function monitorarRodada() {
        var resultadoSorteado = localStorage.getItem("resultadoRoleta");
        var ideiaBrain = localStorage.getItem("sugestoesBrainstorm");
        var listaIdeias = JSON.parse(ideiaBrain) || [];
        
        var statusTxt = document.getElementById("statusRodada");
        var resultadoTxt = document.getElementById("caixaResultado");
        var campo = document.getElementById("campoLetra");
        var botao = document.getElementById("btnEnviar");

        var euJaEnviei = false;
        for (var i = 0; i < listaIdeias.length; i++) {
            if (listaIdeias[i].usuario == usuarioLogado) {
                euJaEnviei = true;
            }
        }

        if (resultadoSorteado) {
            statusTxt.innerText = "Sorteio Realizado!";
            resultadoTxt.innerText = resultadoSorteado;
        } else {
            statusTxt.innerText = "Aguardando sorteio...";
            resultadoTxt.innerText = "";

            if (!ideiaBrain || listaIdeias.length == 0) {
                campo.disabled = false;
                botao.style.backgroundColor = "green";
                botao.innerText = "Enviar";
            } else if (euJaEnviei == true) {
                campo.disabled = true;
                botao.style.backgroundColor = "gray";
                botao.innerText = "Enviado";
            }
        }
    }

    setInterval(monitorarRodada, 1000);
</script>
</body>
</html>
