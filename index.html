<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            width: 100%;
            height: 100%;
        }

        form{
            width: 400px;
            margin: 200px auto;
            text-align: center;
        }
        
        input{
            display: block;
            margin: 5px auto;
            width: 150px;
            height: 30px;
        }
    </style>
</head>
<body>

    <form>
        <h2>Brainstorming através de Roleta</h2>
        <h3>Login</h3>
        <input type="text" placeholder="Usuário" id="login">
        <input type="password" placeholder="Senha" id="senha">
        <input type="button" value="Entrar" onclick="logar()">
    </form>


    <script>
function logar(){
    var login = document.getElementById('login').value.trim();
    var senha = document.getElementById('senha').value;

    if (login === "" || senha === "") {
    alert("Preencha todos os campos!");
    return;
    }

    if(login == "admin"){
        
        if(senha == "1234"){
        location.href = "admin.html";
        return; 
        }
    }else{
        alert('Usuário ou senha inválidos!');
    }

    let userRegister = JSON.parse(localStorage.getItem("userRegister")) || {};

    if (userRegister[login] != undefined) {
        if (userRegister[login] == senha){
            sessionStorage.setItem("userLogin", login);
            location.href = "roleta.html";
        } else {
            alert('Usuário ou senha inválidos!');
        }
    } else {
        userRegister[login] = senha;
        localStorage.setItem("userRegister", JSON.stringify(userRegister));

        sessionStorage.setItem("userLogin", login);
        location.href = "roleta.html";
    }
}
    </script>
</body>
</html>
